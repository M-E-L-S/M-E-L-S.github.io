<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        body {
            background-color: #1a1a2e;
            color: #e0e0e0;
            line-height: 1.6;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        header {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 2px solid #4a4a7a;
            margin-bottom: 10px;
        }

        h1 {
            color: #8a2be2;
            font-size: 2.2rem;
            margin-bottom: 10px;
            text-shadow: 0 0 5px rgba(138, 43, 226, 0.5);
        }

        .subtitle {
            color: #a0a0c0;
            font-size: 1.1rem;
        }

        .main-content {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
        }

        .section {
            background-color: #2a2a3e;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            flex: 1;
            min-width: 300px;
        }

        .section-title {
            color: #8a2be2;
            border-bottom: 1px solid #4a4a7a;
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .operator-selection {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .operator-card {
            background-color: #3a3a4e;
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .operator-card:hover {
            background-color: #4a4a5e;
            transform: translateY(-3px);
        }

        .operator-card.selected {
            border-color: #8a2be2;
            background-color: #3a2a4e;
        }

        .operator-name {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .operator-stats {
            font-size: 0.9rem;
            color: #b0b0d0;
        }

        .relics-container {
            max-height: 500px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .relics-container::-webkit-scrollbar {
            width: 8px;
        }

        .relics-container::-webkit-scrollbar-track {
            background: #2a2a3e;
            border-radius: 4px;
        }

        .relics-container::-webkit-scrollbar-thumb {
            background: #5a5a7a;
            border-radius: 4px;
        }

        .relic-category {
            margin-bottom: 15px;
            border-radius: 8px;
            overflow: hidden;
        }

        .relic-category-header {
            background-color: #3a3a4e;
            padding: 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.3s;
        }

        .relic-category-header:hover {
            background-color: #4a4a5e;
        }

        .relic-category-header.active {
            background-color: #4a3a5e;
        }

        .relic-category-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
            color: #8a2be2;
        }

        .relic-category-count {
            background-color: #8a2be2;
            color: white;
            border-radius: 12px;
            padding: 2px 10px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .relic-category-icon {
            font-size: 1.2rem;
            transition: transform 0.3s;
        }

        .relic-category-icon.rotated {
            transform: rotate(180deg);
        }

        .relic-category-content {
            background-color: #2a2a3e;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

        .relic-category-content.expanded {
            max-height: 500px;
            overflow-y: auto;
        }

        .relic-category-content.expanded::-webkit-scrollbar {
            width: 6px;
        }

        .relic-category-content.expanded::-webkit-scrollbar-track {
            background: #2a2a3e;
        }

        .relic-category-content.expanded::-webkit-scrollbar-thumb {
            background: #5a5a7a;
            border-radius: 3px;
        }

        .relic-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 10px;
            padding: 15px;
        }

        .relic-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #3a3a4e;
            padding: 10px 15px;
            border-radius: 6px;
            transition: background-color 0.2s;
        }

        .relic-item:hover {
            background-color: #4a4a5e;
        }

        .relic-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .relic-count {
            width: 60px;
            padding: 5px;
            background-color: #2a2a3e;
            border: 1px solid #5a5a7a;
            border-radius: 4px;
            color: #e0e0e0;
            text-align: center;
        }

        .relic-count:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .relic-value {
            color: #8a2be2;
            font-weight: bold;
            min-width: 60px;
            text-align: right;
        }

        .enemy-inputs {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            margin-bottom: 8px;
            color: #b0b0d0;
        }

        .input-group input, .input-group select {
            padding: 10px;
            background-color: #3a3a4e;
            border: 1px solid #5a5a7a;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 1rem;
        }

        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: #8a2be2;
        }

        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }

        .calculate-btn {
            background-color: #8a2be2;
            color: white;
            flex: 2;
        }

        .calculate-btn:hover {
            background-color: #9a3bf2;
            transform: translateY(-2px);
        }

        .reset-btn {
            background-color: #4a4a6a;
            color: white;
            flex: 1;
        }

        .reset-btn:hover {
            background-color: #5a5a7a;
        }

        .results {
            background-color: #2a2a3e;
            border-radius: 10px;
            padding: 25px;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .result-title {
            color: #8a2be2;
            font-size: 1.8rem;
            margin-bottom: 15px;
            text-align: center;
        }

        .result-content {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
        }

        .result-box {
            background-color: #3a3a4e;
            border-radius: 8px;
            padding: 20px;
            min-width: 250px;
            text-align: center;
        }

        .result-label {
            color: #b0b0d0;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        .result-value {
            color: #8a2be2;
            font-size: 2rem;
            font-weight: bold;
        }

        .special-result {
            background-color: #3a2a4e;
            border-left: 5px solid #8a2be2;
        }

        .hint {
            color: #a0a0c0;
            font-style: italic;
            margin-top: 15px;
            font-size: 0.9rem;
        }

        .hidden {
            display: none;
        }

        .relic-search {
            margin-bottom: 15px;
        }

        .relic-search input {
            width: 100%;
            padding: 10px 15px;
            background-color: #3a3a4e;
            border: 1px solid #5a5a7a;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 1rem;
        }

        .relic-search input:focus {
            outline: none;
            border-color: #8a2be2;
        }

        .no-relics-message {
            text-align: center;
            padding: 20px;
            color: #a0a0c0;
            font-style: italic;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 40px;
        }

        .checkbox-wrapper input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
            }

            .section {
                width: 100%;
            }

            .operator-selection {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }

            .relic-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

        <div class="section">

            <div class="relics-container" id="relicsContainer">

        <div class="section">

            <div class="buttons">

            </div>
        </div>
    </div>

    <div class="results hidden" id="resultsContainer">

        <div class="result-content">

        </div>
        <p class="hint" id="calculationHint"></p>
    </div>
</div>

    // 创建藏品列表
    function createRelicList(categoryId, relics, container, isPercent) {

        relics.forEach(relic => {
            const relicItem = document.createElement('div');
            relicItem.className = 'relic-item';
            relicItem.dataset.relicId = relic.id;
            relicItem.dataset.category = categoryId;
            relicItem.dataset.relicName = relic.name.toLowerCase();

            const relicInfo = document.createElement('div');
            relicInfo.className = 'relic-info';

            const relicName = document.createElement('span');
            relicName.textContent = relic.name;

            relicInfo.appendChild(relicName);

            const relicValue = document.createElement('div');
            relicValue.className = 'relic-value';

            // 根据是否为百分比显示数值
            if (isPercent) {
                relicValue.textContent = `${(relic.value * 100).toFixed(relic.value < 0 ? 1 : 0)}%`;
            } else {
                relicValue.textContent = relic.value > 0 ? `+${relic.value}` : `${relic.value}`;
            }

            relicItem.appendChild(relicInfo);
            relicItem.appendChild(relicValue);

            // 创建控制区域
            const controlWrapper = document.createElement('div');
            controlWrapper.className = 'checkbox-wrapper';

            if (relic.needsCount) {
                // 需要数量的藏品：显示数字输入框
                const countInput = document.createElement('input');
                countInput.type = 'number';
                countInput.className = 'relic-count';
                countInput.min = 0;
                countInput.value = selectedRelics[categoryId][relic.id] || 0;
                countInput.dataset.id = relic.id;
                countInput.dataset.category = categoryId;
                countInput.dataset.divideBy5 = relic.divideBy5 || false;

                countInput.addEventListener('change', (e) => {
                    const id = parseInt(e.target.dataset.id);
                    const category = e.target.dataset.category;
                    const count = parseInt(e.target.value) || 0;

                    if (count < 0) {
                        e.target.value = 0;
                        delete selectedRelics[category][id];
                    } else if (count > 0) {
                        selectedRelics[category][id] = count;
                    } else {
                        delete selectedRelics[category][id];
                    }

                    // 更新类别计数
                    updateCategoryCount(category);
                });

                controlWrapper.appendChild(countInput);
            } else {
                // 不需要数量的藏品：显示复选框
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.dataset.id = relic.id;
                checkbox.dataset.category = categoryId;
                checkbox.checked = !!selectedRelics[categoryId][relic.id];

                checkbox.addEventListener('change', (e) => {
                    const id = parseInt(e.target.dataset.id);
                    const category = e.target.dataset.category;

                    if (e.target.checked) {
                        selectedRelics[category][id] = 1;
                    } else {
                        delete selectedRelics[category][id];
                    }

                    // 更新类别计数
                    updateCategoryCount(category);
                });

                controlWrapper.appendChild(checkbox);
            }

            relicItem.appendChild(controlWrapper);
            container.appendChild(relicItem);
        });

        // 更新类别计数
        updateCategoryCount(categoryId);
    }

            const content = document.getElementById(`${category.id}-content`);

                    noResultsMsg.textContent = `在"${category.name}"中没有找到匹配的藏品`;

                noResultsMsg.remove();

                header.classList.add('active');
                content.classList.add('expanded');

    // 计算总伤害
    function calculateDamage() {
        if (!selectedOperator) {
            alert('请先选择干员！');
            return;
        }

        // 重置结果
        totalDamageEl.textContent = '0';
        specialDamageBoxEl.classList.add('hidden');

        // 计算攻速加成
        let atkSpeed = selectedOperator.atkSpeed;

        // 添加攻速藏品（按照原C程序逻辑处理）
        Object.keys(selectedRelics.atkSpeed).forEach(id => {
            const relic = atkSpeedRelics.find(r => r.id === parseInt(id));
            if (relic) {
                let times = selectedRelics.atkSpeed[id];

                // 特殊处理：序号>=24的藏品，数量除以5
                if (relic.id >= 24 && relic.divideBy5) {
                    times = times / 5;
                }

                atkSpeed += relic.value * times;
            }
        });

        // 初始化伤害数组
        let Atk = Array.from({ length: 6 }, () => Array(20).fill(1.0));

        // 添加干员技能倍率
        for (let j = 0; j < 6; j++) {
            if (selectedOperator.skillMul[j]) {
                Atk[j][0] += selectedOperator.skillMul[j][0];
                Atk[j][1] += selectedOperator.skillMul[j][1];

                if (selectedOperator.skillMul[j][2] !== 0) {
                    Atk[j][2] *= selectedOperator.skillMul[j][2];
                }

                if (selectedOperator.skillMul[j][3] !== 0) {
                    Atk[j][3] *= selectedOperator.skillMul[j][3];
                }
            }
        }

        // 添加面板乘算藏品（按照原C程序逻辑处理）
        Object.keys(selectedRelics.mulAdd).forEach(id => {
            const relic = mulAddRelics.find(r => r.id === parseInt(id));
            if (relic) {
                let value = relic.value;
                let times = selectedRelics.mulAdd[id];

                // 特殊处理：序号>=26的藏品需要读取数量
                if (relic.id >= 26) {
                    value = value * times;
                }

                for (let i = 0; i < 6; i++) {
                    Atk[i][0] += value;
                }
            }
        });

        // 添加倍率乘算叠加藏品（按照原C程序逻辑处理）
        Object.keys(selectedRelics.globalMulAdd).forEach(id => {
            const relic = globalMulAddRelics.find(r => r.id === parseInt(id));
            if (relic) {
                let value = relic.value;

                // 特殊处理：序号>=5的藏品需要读取数量
                if (relic.id >= 5) {
                    const times = selectedRelics.globalMulAdd[id];
                    value = value * times;
                }

                for (let i = 0; i < 6; i++) {
                    Atk[i][1] += value;
                }
            }
        });

        // 添加倍率乘算叠乘藏品
        Object.keys(selectedRelics.globalMulMul).forEach(id => {
            const relic = globalMulMulRelics.find(r => r.id === parseInt(id));
            if (relic) {
                for (let i = 0; i < 6; i++) {
                    Atk[i][2] *= relic.value;
                }
            }
        });

        // 重置元素脆弱值
        elementFragile = 0;

        // 添加脆弱乘算藏品（按照原C程序逻辑处理）
        Object.keys(selectedRelics.fragile).forEach(id => {
            const relic = globalFragileRelics.find(r => r.id === parseInt(id));
            if (relic) {
                const count = selectedRelics.fragile[id];

                switch (relic.id) {
                    case 0:
                    case 1:
                    case 2:
                        for (let i = 0; i < 6; i++) {
                            Atk[i][4] += relic.value;
                        }
                        break;
                    case 3:
                        elementFragile += 0.5;
                    case 4:
                        elementFragile += 0.5;
                    case 5:
                    case 6:
                    case 7:
                        for (let i = 0; i < 6; i++) {
                            Atk[i][5] += relic.value;
                        }
                        break;
                    case 8:
                        for (let i = 0; i < 6; i++) {
                            Atk[i][6] += relic.value;
                        }
                        break;
                    case 9:
                        for (let i = 0; i < 6; i++) {
                            Atk[i][7] += relic.value;
                        }
                        break;
                    case 10:
                        for (let i = 0; i < 6; i++) {
                            Atk[i][8] += relic.value;
                        }
                        break;
                    case 11:
                        for (let i = 0; i < 6; i++) {
                            Atk[i][9] += relic.value;
                        }
                        break;
                    case 12:
                        for (let i = 0; i < 6; i++) {
                            Atk[i][10] += relic.value;
                        }
                        break;
                    case 13:  // 断杖-波纹需要读取数量
                        for (let i = 0; i < 6; i++) {
                            Atk[i][11] += relic.value * count;
                        }
                        break;
                    default:
                        break;
                }
            }
        });

        // 计算伤害
        let totalDamage = 0;
        let specialDamage = 0;
        let hintText = '';

        if (selectedOperator.damageType[0]) {
            // 物理伤害计算
            const defInput = document.getElementById('defInput');
            if (!defInput || defInput.value === '') {
                alert('请输入敌方防御力！');
                return;
            }

            let def = parseFloat(defInput.value);
            def = def - selectedOperator.ignoreDef[0] > 0 ? def - selectedOperator.ignoreDef[0] : 0;

            let NumOfMul = 1;

            for (let i = 0; i < 6; i++) {
                if (!selectedOperator.skillMul[i]) continue;

                let skillDamage = selectedOperator.atk;

                // 应用乘算
                for (let j = 0; j < 3; j++) {
                    skillDamage *= Atk[i][j];
                }

                // 计算防御减免
                skillDamage = skillDamage - def > skillDamage * 0.05 ? skillDamage - def : skillDamage * 0.05;

                // 应用脆弱乘算
                for (let j = 3; j < 20; j++) {
                    if(i === 0 && j !== 3) NumOfMul *= Atk[i][j];
                    skillDamage *= Atk[i][j];
                }

                // 计算攻击次数
                const atkCount = selectedOperator.skillDuration[i] === 0 ? 1 :
                    selectedOperator.skillDuration[i] / (selectedOperator.atkInterval * 100.0 / atkSpeed);

                skillDamage *= atkCount * selectedOperator.atkCount[i];
                totalDamage += skillDamage;
            }

            hintText = `计算完成，攻速: ${atkSpeed.toFixed(1)}，局外倍率: ${((Atk[0][0] - selectedOperator.skillMul[0][0]) * 100).toFixed(1)}%，局内倍率: ${((Atk[0][1] - selectedOperator.skillMul[0][1]) * 100).toFixed(1)}%，乘算叠乘： ${((Atk[0][2] / selectedOperator.skillMul[0][2]) * 100).toFixed(1)}%，脆弱: ${((NumOfMul / selectedOperator.skillMul[0][3]) * 100).toFixed(1)}%`;
        }

        if (selectedOperator.damageType[1]) {
            // 法术伤害计算
            const resInput = document.getElementById('resInput');
            if (!resInput || resInput.value === '') {
                alert('请输入敌方法术抗性！');
                return;
            }

            let res = parseFloat(resInput.value);
            res = res - selectedOperator.ignoreDef[1] > 0 ? res - selectedOperator.ignoreDef[1] : 0;

            let NumOfMul = 1;

            // 逻各斯特判
            if (selectedOperator.id === 2) {
                totalDamage = handleLogosSpecialCase(res, Atk, atkSpeed);
                for (let j = 4; j < 20; j++) {
                    NumOfMul *= Atk[0][j];
                }
                hintText = `计算完成，攻速: ${atkSpeed.toFixed(1)}，局外倍率: ${((Atk[0][0] - selectedOperator.skillMul[0][0]) * 100).toFixed(1)}%，局内倍率: ${((Atk[0][1] - selectedOperator.skillMul[0][1]) * 100).toFixed(1)}%，乘算叠乘： ${((Atk[0][2] / selectedOperator.skillMul[0][2]) * 100).toFixed(1)}%，脆弱: ${((NumOfMul) * 100).toFixed(1)}%`;
                hintText += `模拟次数: 100,000`;
            } else {
                for (let i = 0; i < 6; i++) {
                    if (!selectedOperator.skillMul[i]) continue;

                    let skillDamage = selectedOperator.atk;

                    // 应用所有乘算
                    for (let j = 0; j < 20; j++) {
                        if(j >= 4 && i === 0) NumOfMul *= Atk[i][j];
                        skillDamage *= Atk[i][j];
                    }

                    // 计算法抗减免
                    skillDamage = skillDamage * (100 - res) / 100.0 > skillDamage * 0.05 ?
                        skillDamage * (100 - res) / 100.0 : skillDamage * 0.05;

                    // 计算攻击次数
                    const atkCount = selectedOperator.skillDuration[i] === 0 ? 1 :
                        selectedOperator.skillDuration[i] / (selectedOperator.atkInterval * 100.0 / atkSpeed);

                    skillDamage *= atkCount * selectedOperator.atkCount[i];
                    totalDamage += skillDamage;
                }

                // 拉普兰德的特殊处理
                if (selectedOperator.id === 4) {
                    specialDamage = totalDamage;

                    // 重新计算总伤害（排除第四个技能）
                    totalDamage = 0;
                    for (let i = 0; i < 3; i++) {
                        if (!selectedOperator.skillMul[i]) continue;

                        let skillDamage = selectedOperator.atk;

                        for (let j = 0; j < 20; j++) {
                            skillDamage *= Atk[i][j];
                        }

                        skillDamage = skillDamage * (100 - res) / 100.0 > skillDamage * 0.05 ?
                            skillDamage * (100 - res) / 100.0 : skillDamage * 0.05;

                        const atkCount = selectedOperator.skillDuration[i] === 0 ? 1 :
                            selectedOperator.skillDuration[i] / (selectedOperator.atkInterval * 100.0 / atkSpeed);

                        skillDamage *= atkCount * selectedOperator.atkCount[i];
                        totalDamage += skillDamage;
                    }
                    specialDamage -= totalDamage;
                }

                hintText = `计算完成，攻速: ${atkSpeed.toFixed(1)}，局外倍率: ${((Atk[0][0] - selectedOperator.skillMul[0][0]) * 100).toFixed(1)}%，局内倍率: ${((Atk[0][1] - selectedOperator.skillMul[0][1]) * 100).toFixed(1)}%，乘算叠乘： ${((Atk[0][2] / selectedOperator.skillMul[0][2]) * 100).toFixed(1)}%，脆弱: ${((NumOfMul) * 100).toFixed(1)}%`;
            }
        }

        // 显示结果
        totalDamageEl.textContent = totalDamage.toFixed(2);

        if (selectedOperator.id === 4) {
            specialDamageBoxEl.classList.remove('hidden');
            specialDamageEl.textContent = specialDamage.toFixed(2);
        }

        calculationHintEl.textContent = hintText;
        resultsContainerEl.classList.remove('hidden');
    }

    // 逻各斯特殊处理
    function handleLogosSpecialCase(res, Atk, atkSpeed) {
        // 简化版的逻各斯计算
        const TRY = 100000;
        let totalDamage = 0;

        // 计算三个技能的伤害
        let sum = [0, 0, 0];

        for (let i = 0; i < 2; i++) {
            sum[i] = selectedOperator.atk;
            for (let j = 0; j < 3; j++) {
                sum[i] *= Atk[i][j];
            }
            sum[i] += 150;
            sum[i] = sum[i] * (100 - res) / 100.0 > sum[i] * 0.05 ?
                sum[i] * (100 - res) / 100.0 : sum[i] * 0.05;
            for (let j = 3; j < 20; j++) {
                sum[i] *= Atk[i][j];
            }
        }

        sum[2] = selectedOperator.atk;
        for (let j = 0; j < 20; j++) {
            sum[2] *= Atk[2][j];
        }

        const atkCount = Math.round(30 / (selectedOperator.atkInterval * 100.0 / atkSpeed));
        const elementBurstDuration = Math.floor(atkCount / 2);

        // 模拟多次取平均
        for (let tryCount = 0; tryCount < TRY; tryCount++) {
            let tryDamage = 0;
            let apoptosisDamage = 0;
            let elementBurstTimer = 0;

            for (let i = 0; i < atkCount; i++) {
                let dph = 0;
                const randomMod = Math.floor(Math.random() * 5);

                if (randomMod < 3) {
                    dph = sum[0] + sum[1];
                } else {
                    dph = sum[0];
                }

                if (apoptosisDamage < 1000 + (isBoss ? 1000 : 0)) {
                    apoptosisDamage += dph * 0.08 * (1 + elementFragile);
                } else {
                    // 凋亡爆发期
                    if (elementBurstTimer === 0) {
                        tryDamage += 12000;
                    }

                    if (randomMod < 3) {
                        dph += sum[2];
                    }

                    elementBurstTimer++;
                    if (elementBurstTimer === elementBurstDuration) {
                        elementBurstTimer = 0;
                        apoptosisDamage = 0;
                    }
                }

                tryDamage += dph;
            }

            totalDamage += tryDamage;
        }

        return totalDamage / TRY;
    }

    // 重置选择
    function resetSelection() {
        // 重置干员选择
        selectedOperator = null;
        document.querySelectorAll('.operator-card.selected').forEach(card => {
            card.classList.remove('selected');
        });

        // 重置藏品选择
        selectedRelics = {
            atkSpeed: {},
            mulAdd: {},
            globalMulAdd: {},
            globalMulMul: {},
            fragile: {}
        };

        // 重置输入框
        document.querySelectorAll('.relic-count').forEach(input => {
            input.value = 0;
        });

        document.querySelectorAll('input[type="checkbox"]').forEach(checkbox => {
            checkbox.checked = false;
        });

        // 重置类别计数
        relicCategories.forEach(category => {
            updateCategoryCount(category.id);
        });

        // 重置搜索框
        relicSearchEl.value = '';
        filterRelics();

        // 重置特殊选项
        laplandStackCount = 0;
        elementFragile = 0;
        isBoss = false;

        specialOptionsEl.classList.add('hidden');
        specialOptionsEl.innerHTML = '';

        // 重置敌人输入
        enemyInputsEl.innerHTML = '';

        // 隐藏结果
        resultsContainerEl.classList.add('hidden');

        // 折叠所有藏品类别
        document.querySelectorAll('.relic-category-header').forEach(header => {
            header.classList.remove('active');
            const content = header.nextElementSibling;
            content.classList.remove('expanded');
            header.querySelector('.relic-category-icon:last-child').classList.remove('rotated');
        });

        alert('已重置所有选择！');
    }

    // 初始化应用
    function initApp() {
        initOperatorSelection();
        initRelicsSelection();

        // 绑定事件
        calculateBtn.addEventListener('click', calculateDamage);
        resetBtn.addEventListener('click', resetSelection);

        // 默认选择第一个干员
        if (operators.length > 0) {
            selectOperator(0);
        }

        // 默认展开第一个藏品类别
        setTimeout(() => {
            const firstCategory = document.querySelector('.relic-category-header');
            if (firstCategory) {
                firstCategory.click();
            }
        }, 100);
    }

    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', initApp);
</script>
