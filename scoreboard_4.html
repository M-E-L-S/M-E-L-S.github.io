<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>仙术杯分数计算器</title>
    <style>
        /* 保持原有所有样式 */
        body {
            background: #505050;
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .calculator {
            background: #e0e0e0;
            max-width: 1400px;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .double-column {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        .category {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #d0d0d0;
            break-inside: avoid;
        }
        h2 {
            color: #444;
            font-size: 16px;
            margin: 0 0 12px 0;
            padding-bottom: 6px;
            border-bottom: 2px solid #ddd;
        }
        .sub-category {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 8px 0;
            padding: 4px 0;
            width: 100%;
        }
        .sub-category label {
            flex: 1;
            font-size: 16px;
            color: #333;
            margin-right: 15px;
            min-width: 160px;
        }
        input {
            width: 70px;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
            font-size: 14px;
            background: white;
        }
        .option-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .option-header {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .option-header span {
            width: 70px;
            text-align: center;
            font-size: 12px;
            color: #666;
        }
        #total {
            grid-column: 1 / -1;
            background: #d8d8d8;
            padding: 15px;
            border-radius: 6px;
            font-size: 24px;
            font-weight: bold;
            margin-top: 15px;
            text-align: center;
        }
        button {
            grid-column: 1 / -1;
            width: 200px;
            padding: 12px;
            margin: 15px 0;
            background: #808080;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
        }
        /* 新增按钮样式 */
        .clickable-label {
            cursor: pointer;
            transition: background 0.2s;
            padding: 2px 8px;
            border-radius: 4px;
            background: none;
            border: none;
            text-align: left;
            font: inherit;
            color: inherit;
        }
        .clickable-label:hover {
            background: rgba(0,0,0,0.1);
        }
        .option-header button {
            width: 70px;
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            padding: 0;
            font-size: 12px;
        }
        .option-header button:hover {
            color: #444;
        }

        /* 开关样式 */
        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .score-multiplier {
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
            margin-right: 10px;
            flex-shrink: 0;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            width: 100%;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
        }

        input:checked + .slider {
            background-color: #2196F3;
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        .slider.round {
            border-radius: 34px;
        }

        .slider.round:before {
            border-radius: 50%;
        }

        /* ========================================================
           响应式媒体查询深度修复与优化
           ======================================================== */
        @media (max-width: 1200px) {
            .calculator {
                grid-template-columns: 1fr;
                width: 100%;
                max-width: 100%;
                box-sizing: border-box;
                padding: 20px;
            }
            .double-column {
                grid-template-columns: 1fr;
            }
            .category {
                box-sizing: border-box;
            }
        }

        /* 针对 600px 以下的手机窄屏进行精准适配 */
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }
            .calculator {
                padding: 12px;
                gap: 12px;
            }
            .category {
                padding: 12px;
            }
            h2 {
                font-size: 15px;
                margin-bottom: 10px;
            }
            .sub-category {
                flex-wrap: wrap; /* 核心改动：允许内容过宽时弹性换行 */
                gap: 6px;
            }
            .sub-category label, .clickable-label {
                font-size: 14px;
                min-width: auto;
                margin-right: 5px;
                flex: 1; /* 自动分配剩余空间，文本过长会自动在内部换行，不撑开容器 */
            }
            /* 手机端让多选项组（如包含多个input的区域）自动掉到文本下方，独占一横行 */
            .sub-options {
                width: 100%;
                margin-top: 2px;
            }
            .option-header {
                justify-content: flex-start;
                gap: 5px;
            }
            .option-inputs {
                display: flex;
                gap: 5px;
            }
            /* 关键点：稍微缩减手机端的按钮和输入框固定宽度(70px -> 58px)，确保4个并排绝对不会挤爆屏幕 */
            input, .option-header button, .option-header span {
                width: 58px !important;
                font-size: 13px;
                padding: 5px;
            }
            /* 成绩单成绩报告区域防溢出滚动 */
            #score-report {
                overflow-x: auto;
                width: 100%;
                box-sizing: border-box;
            }
            #score-report table {
                min-width: 450px; /* 保证表格在手机上可横向滑动阅览，数据不挤压错位 */
            }
        }
    </style>
</head>

                <button class="clickable-label" onclick="incrementCounter(this)">不容拒绝三面菈玛莲、歌利亚、凯尔希</button>
                <div class="sub-options">
                    <div class="option-group">
                        <div class="option-header">
                            <button onclick="incrementCounter(this, 0)">基础</button>
                        </div>
                        <div class="option-inputs">
                            <input type="number" data-score="50" min="0" value="0">
                        </div>
                    </div>
                </div>
            </div>

            <div class="sub-category">
                <button class="clickable-label" onclick="incrementCounter(this)">不容拒绝</button>
                <div class="sub-options">
                    <div class="option-group">
                        <div class="option-header">
                            <button onclick="incrementCounter(this, 0)">基础</button>
                            <button onclick="incrementCounter(this, 1)">无漏</button>
                            <button onclick="incrementCounter(this, 2)">混乱</button>
                            <button onclick="incrementCounter(this, 3)">滚动</button>
                        </div>
                        <div class="option-inputs">
                            <input type="number" data-score="150" min="0" value="0">
                            <input type="number" data-score="50" min="0" value="0">
                            <input type="number" data-score="100" min="0" value="0">
                            <input type="number" data-score="100" min="0" value="0">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="category">
        <h2>抢商店</h2>
        <div class="sub-category">
            <button class="clickable-label" onclick="incrementCounter(this)">物权纠纷（+100/次）</button>
            <input type="number" data-score="100" min="0" value="0">
        </div>
    </div>

    <div class="category">
        <h2>不期而遇作战</h2>
        <div class="sub-category">
            <button class="clickable-label" onclick="incrementCounter(this)">战场侧面（+20/次）</button>
            <input type="number" data-score="20" min="0" value="0">
        </div>
        <div class="sub-category">
            <button class="clickable-label" onclick="incrementCounter(this)">紧急战场侧面（+40/次）</button>
            <input type="number" data-score="40" min="0" value="0">
        </div>
    </div>

    <div class="category">
        <h2>负面藏品加分</h2>
        <div class="sub-category">
            <button class="clickable-label" onclick="incrementCounter(this)">奎萨图什塔允诺/霸迩萨狂言（+200/次）</button>
            <input type="number" data-score="200" min="0" value="0">
        </div>
        <div class="sub-category">
            <button class="clickable-label" onclick="incrementCounter(this)">以勒什呓语（+150/次）</button>
            <input type="number" data-score="150" min="0" value="0">
        </div>
        <div class="sub-category">
            <button class="clickable-label" onclick="incrementCounter(this)">戈渎不语（+100/次）</button>
            <input type="number" data-score="100" min="0" value="0">
        </div>
        <div class="sub-category">
            <button class="clickable-label" onclick="incrementCounter(this)">未叙魔王残片（+50/次）</button>
            <input type="number" data-score="50" min="0" value="0">
        </div>
        <div class="sub-category">
            <button class="clickable-label" onclick="incrementCounter(this)">基础分（+400/次）</button>
            <input type="number" data-score="400" min="0" value="0">
        </div>
    </div>

    <div class="category">
        <h2>三层关底加分</h2>
        <div class="sub-category">
            <button class="clickable-label" onclick="incrementCounter(this)">王冠之下（+40/次）</button>
            <input type="number" data-score="40" min="0" value="0">
        </div>
        <div class="sub-category">
            <button class="clickable-label" onclick="incrementCounter(this)">赴敌者（+50/次）</button>
            <input type="number" data-score="50" min="0" value="0">
        </div>
        <div class="sub-category">
            <button class="clickable-label" onclick="incrementCounter(this)">或然面纱（+50/次）</button>
            <input type="number" data-score="50" min="0" value="0">
        </div>
        <div class="sub-category">
            <button class="clickable-label" onclick="incrementCounter(this)">离歌的庭院（+50/次）</button>
            <input type="number" data-score="50" min="0" value="0">
        </div>
    </div>

    <div class="category">
        <h2>结算加分</h2>
        <div class="sub-category">
            <button class="clickable-label" onclick="incrementCounter(this)">藏品（+5/次）</button>
            <input type="number" data-score="5" min="0" value="0">
        </div>
        <div class="sub-category">
            <button class="clickable-label" onclick="incrementCounter(this)">未进树洞（+150/次）</button>
            <input type="number" data-score="150" min="0" value="0">
        </div>
        <div class="sub-category">
            <label>局内结算分</label>
            <input type="number" data-score="1" min="0" value="0">
        </div>
    </div>

    <div id="total">0</div>
</div>

<script>
    // 点击计数功能
    function incrementCounter(button, index = 0) {
        const wrapper = button.closest('.sub-category') || button.closest('.option-group');
        const inputs = wrapper.querySelectorAll('input[type="number"]');

        if (inputs.length > index) {
            const input = inputs[index];
            input.value = parseInt(input.value) + 1;
            input.dispatchEvent(new Event('input'));
        }
    }

    // 计算总分功能
    function calculate() {
        let total = 0;
        document.querySelectorAll('input[type="number"]').forEach(input => {
            total += (parseInt(input.value) || 0) * parseInt(input.dataset.score);
        });

        const totalElement = document.getElementById('total');
        totalElement.textContent = total;
        totalElement.style.color = total >= 0 ? '#2a611e' : '#a32121';
    }

    // 更新所有input的data-score值
    function updateScores(categoryElement, multiplier = 1) {
        categoryElement.querySelectorAll('input[type="number"]').forEach(input => {
            if (!input.dataset.originalScore) {
                input.dataset.originalScore = input.dataset.score; // 保存原始值
            }
            const originalScore = parseInt(input.dataset.originalScore);
            input.dataset.score = Math.round(originalScore * multiplier);
        });
    }

    // 切换分数模式
    function toggleScoreMultiplier(event) {
        const multiplierToggle = event.target;
        const category = multiplierToggle.closest('.category'); // 只获取当前开关所在的分类
        const multiplier = multiplierToggle.checked ? 1.5 : 1;

        updateScores(category, multiplier);
        calculate(); // 全局重新计算总分
    }

    // 初始化
    document.addEventListener('DOMContentLoaded', function() {
        // 为所有输入添加事件监听
        document.querySelectorAll('input[type="number"]').forEach(input => {
            input.addEventListener('input', calculate);
        });

        // 为切换开关添加事件监听
        document.querySelectorAll('#multiplierToggle').forEach(toggle => {
            toggle.addEventListener('change', toggleScoreMultiplier);

            // 初始化当前 toggle 所在 category 的分数
            const category = toggle.closest('.category');
            updateScores(category, 1);
        });
    });

    // 创建打印按钮
    const printBtn = document.createElement('button');
    printBtn.textContent = '打印成绩单';
    printBtn.style.marginTop = '20px';
    printBtn.style.backgroundColor = '#4CAF50';
    document.querySelector('.calculator').appendChild(printBtn);

    // 创建成绩单显示区域
    const reportDiv = document.createElement('div');
    reportDiv.id = 'score-report';
    reportDiv.style.marginTop = '20px';
    reportDiv.style.padding = '15px';
    reportDiv.style.backgroundColor = '#f5f5f5';
    reportDiv.style.borderRadius = '8px';
    document.querySelector('.calculator').appendChild(reportDiv);

    // 打印成绩单功能
    printBtn.addEventListener('click', function() {
        const reportData = [];

        // 收集所有非零数据
        document.querySelectorAll('.category').forEach(category => {
            const categoryTitle = category.querySelector('h2').textContent;
            const items = [];

            category.querySelectorAll('.sub-category').forEach(subCategory => {
                const inputs = subCategory.querySelectorAll('input[type="number"]');
                const label = subCategory.querySelector('.clickable-label')?.textContent ||
                    subCategory.querySelector('label')?.textContent || '';

                // 特殊处理"局内结算分"
                if (label.includes('局内结算分')) {
                    const value = parseInt(inputs[0].value);
                    if(value > 0) {
                        items.push({
                            name: label,
                            count: '', // 不显示次数
                            score: '', // 不显示单次分数
                            total: value * parseInt(inputs[0].dataset.score),
                            isSpecial: true
                        });
                    }
                }
                // 处理普通单项
                else if(inputs.length === 1) {
                    const value = parseInt(inputs[0].value);
                    if(value > 0) {
                        items.push({
                            name: label.replace(/（.+）/, '').trim(),
                            count: value,
                            score: parseInt(inputs[0].dataset.score),
                            total: value * parseInt(inputs[0].dataset.score),
                            hasOptions: false
                        });
                    }
                }
                // 处理有子选项的项
                else if(inputs.length > 1) {
                    const subOptions = [];
                    let subTotal = 0;

                    // 收集选项名称和值
                    const optionHeaders = subCategory.querySelectorAll('.option-header button');
                    optionHeaders.forEach((header, i) => {
                        if(i < inputs.length) {
                            const val = parseInt(inputs[i].value);
                            const score = parseInt(inputs[i].dataset.score);
                            if(val > 0) {
                                const optionTotal = val * score;
                                subOptions.push({
                                    name: header.textContent,
                                    value: val,
                                    score: score,
                                    total: optionTotal
                                });
                                subTotal += optionTotal;
                            }
                        }
                    });

                    if(subOptions.length > 0) {
                        items.push({
                            name: label,
                            count: '', // 不显示次数
                            score: '', // 不显示单次分数
                            total: subTotal,
                            hasOptions: true,
                            options: subOptions
                        });
                    }
                }
            });

            if(items.length > 0) {
                reportData.push({
                    category: categoryTitle,
                    items: items
                });
            }
        });

        // 生成报告HTML
        let reportHTML = '<h3>成绩单</h3><table style="width:100%;border-collapse:collapse;">';
        reportHTML += '<tr><th style="text-align:left;padding:8px;border-bottom:1px solid #ddd;">项目</th>' +
            '<th style="text-align:right;padding:8px;border-bottom:1px solid #ddd;">次数</th>' +
            '<th style="text-align:right;padding:8px;border-bottom:1px solid #ddd;">单次分数</th>' +
            '<th style="text-align:right;padding:8px;border-bottom:1px solid #ddd;">小计</th></tr>';

        reportData.forEach(section => {
            reportHTML += `<tr><td colspan="4" style="padding:8px;font-weight:bold;background-color:#e0e0e0;">${section.category}</td></tr>`;

            section.items.forEach(item => {
                // 主项目行
                reportHTML += `<tr>
                    <td style="padding:8px;border-bottom:1px solid #eee;">${item.name}</td>
                    <td style="text-align:right;padding:8px;border-bottom:1px solid #eee;">${item.count}</td>
                    <td style="text-align:right;padding:8px;border-bottom:1px solid #eee;">${item.score}</td>
                    <td style="text-align:right;padding:8px;border-bottom:1px solid #eee;">${item.total}</td>
                </tr>`;

                // 子选项行
                if(item.hasOptions && item.options.length > 0) {
                    item.options.forEach(opt => {
                        reportHTML += `<tr>
                            <td style="padding:8px 8px 8px 30px;border-bottom:1px solid #eee;font-size:0.9em;color:#666;">
                                <span style="font-size:0.8em;vertical-align:sub;">${opt.name}</span>
                            </td>
                            <td style="text-align:right;padding:8px;border-bottom:1px solid #eee;font-size:0.9em;color:#666;">${opt.value}</td>
                            <td style="text-align:right;padding:8px;border-bottom:1px solid #eee;font-size:0.9em;color:#666;">${opt.score}</td>
                            <td style="text-align:right;padding:8px;border-bottom:1px solid #eee;font-size:0.9em;color:#666;">${opt.total}</td>
                        </tr>`;
                    });
                }
            });
        });

        // 添加总分
        const totalScore = parseInt(document.getElementById('total').textContent);
        reportHTML += `<tr>
            <td colspan="3" style="padding:8px;font-weight:bold;text-align:right;border-top:2px solid #ddd;">总分</td>
            <td style="text-align:right;padding:8px;font-weight:bold;border-top:2px solid #ddd;">${totalScore}</td>
        </tr>`;

        reportHTML += '</table>';
        reportDiv.innerHTML = reportHTML;
    });
</script>


</body>
</html>
