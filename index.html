<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鲜蔬杯工具中心</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        .wrapper {
            display: flex;
            height: 100vh;
        }

        /* 侧边栏样式（保持不变） */
        .sidebar {
            width: 60px;
            background-color: #333;
            color: white;
            display: flex;
            flex-direction: column;
            transition: width 0.3s ease;
            box-shadow: 2px 0 5px rgba(0,0,0,0.2);
            z-index: 10;
            overflow: hidden;
        }
        .sidebar.expanded { width: 200px; }
        .sidebar-header {
            padding: 15px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: #ccc;
            height: 120px;
        }
        .sidebar.expanded .sidebar-header { flex-direction: row; justify-content: flex-start; padding: 15px; height: auto; }
        .icon { font-size: 20px; margin-bottom: 5px; }
        .sidebar.expanded .icon { margin-bottom: 0; margin-right: 15px; }
        .text { writing-mode: vertical-lr; letter-spacing: 5px; font-size: 14px; }
        .sidebar.expanded .text { writing-mode: horizontal-tb; letter-spacing: normal; }

        /* 菜单区域 */
        .sidebar-menu {
            display: flex;
            flex-direction: column;
            padding: 10px;
            opacity: 0;
            pointer-events: none; /* 关键改动：收起时禁用交互 */
            transition: opacity 0.2s ease;
        }
        .sidebar.expanded .sidebar-menu {
            opacity: 1;
            pointer-events: auto; /* 关键改动：展开时恢复交互 */
        }
        .nav-btn { background: none; border: 1px solid #555; color: #ddd; padding: 12px; margin-bottom: 10px; cursor: pointer; text-align: left; border-radius: 5px; transition: 0.3s; }
        .nav-btn:hover, .nav-btn.active { background-color: #4CAF50; border-color: #4CAF50; color: white; }

        /* 内容区域修改 */
        .content { flex-grow: 1; height: 100%; position: relative; }

        /* iframe 样式：默认隐藏，通过 active 类显示 */
        .page-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }
        .page-frame.active {
            display: block;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header" onclick="toggleSidebar()">
            <span class="icon">☰</span>
            <span class="text">工具切换</span>
        </div>

        <div class="sidebar-menu">
            <button class="nav-btn active" onclick="switchPage('frame-scoreboard_5', this)">计分器 - 界园</button>
            <button class="nav-btn" onclick="switchPage('frame-scoreboard_4', this)">计分器 - 萨卡兹</button>
            <button class="nav-btn" onclick="switchPage('frame-calculator', this)">伤害计算器</button>
        </div>
    </div>

    <div class="content">
        <iframe id="frame-scoreboard_5" class="page-frame active" src="scoreboard_5.html"></iframe>
        <iframe id="frame-scoreboard_4" class="page-frame active" src="scoreboard_4.html"></iframe>
        <iframe id="frame-calculator" class="page-frame" src="calculator.html"></iframe>
    </div>
</div>

<script>
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('expanded');
    }

    function switchPage(frameId, btn) {
        // 1. 隐藏所有 iframe
        document.querySelectorAll('.page-frame').forEach(f => f.classList.remove('active'));

        // 2. 显示选中的 iframe
        document.getElementById(frameId).classList.add('active');

        // 3. 更新按钮选中状态
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
</script>

</body>
</html>
